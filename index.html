<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1a12" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function(){var t=localStorage.getItem('grow-theme');if(t&&t!=='auto')document.documentElement.dataset.theme=t;})();
    </script>
    <!-- Critical paint styles: match the brand background immediately so there's
         no white flash before the CSS bundle / React splash load. -->
    <style>
      html { background: #0e1a12; }
      @media (prefers-color-scheme: light) { html { background: #faf7f2; } }
      html[data-theme="dark"]  { background: #0e1a12; }
      html[data-theme="light"] { background: #faf7f2; }
      body { margin: 0; }
      #root { min-height: 100vh; }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Grow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>The Grow Calendar</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
