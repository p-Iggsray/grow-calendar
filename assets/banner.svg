<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fde047">
        <animate attributeName="stop-color" values="#fde047;#fbbf24;#fde047" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="28%" stop-color="#fb923c">
        <animate attributeName="stop-color" values="#fb923c;#f97316;#fb923c" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#db2777;#ec4899" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#6d28d9;#7c3aed" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffbeb" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#fde047" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="leaf" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>

    <path id="bf200" d="M 0 0 C -10 -10, -18 -30, -18 -60 C -18 -94, -10 -150, 0 -200 C 10 -150, 18 -94, 18 -60 C 18 -30, 10 -10, 0 0 Z"/>
    <path id="bf175" d="M 0 0 C -10 -8, -17 -28, -17 -55 C -17 -86, -10 -130, 0 -175 C 10 -130, 17 -86, 17 -55 C 17 -28, 10 -8, 0 0 Z"/>
    <path id="bf140" d="M 0 0 C -8 -8, -14 -22, -14 -45 C -14 -72, -8 -105, 0 -140 C 8 -105, 14 -72, 14 -45 C 14 -22, 8 -8, 0 0 Z"/>
    <path id="bf100" d="M 0 0 C -7 -6, -12 -18, -12 -35 C -12 -56, -7 -76, 0 -100 C 7 -76, 12 -56, 12 -35 C 12 -18, 7 -6, 0 0 Z"/>

    <filter id="titleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#sky)"/>

  <g fill="#fffbeb">
    <circle cx="160" cy="50" r="1.6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="90" r="1">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="35" r="1.2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="70" r="1.5">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1160" cy="45" r="1">
      <animate attributeName="opacity" values="0.1;0.75;0.1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="40" r="1.3">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle cx="640" cy="225" r="290" fill="url(#sunGlow)">
    <animate attributeName="r" values="290;320;290" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="8s" repeatCount="indefinite"/>
  </circle>

  <circle cx="640" cy="225" r="68" fill="#fef3c7" opacity="0.95">
    <animate attributeName="r" values="68;76;68" dur="6s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.55">
    <rect x="0" y="285" width="1280" height="3" fill="#fef9c3"/>
    <rect x="0" y="298" width="1280" height="2" fill="#fef9c3" opacity="0.7"/>
    <rect x="0" y="310" width="1280" height="2" fill="#fef9c3" opacity="0.45"/>
    <rect x="0" y="322" width="1280" height="1" fill="#fef9c3" opacity="0.3"/>
  </g>

  <g transform="translate(195 285)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        values="-3 0 0; 3 0 0; -3 0 0"
                        dur="9s" repeatCount="indefinite"/>
      <g transform="scale(0.55)">
        <rect x="-3.5" y="0" width="7" height="68" rx="3" fill="#365314"/>
        <g fill="url(#leaf)" stroke="#022c22" stroke-width="2" stroke-linejoin="round">
          <use href="#bf200"/>
          <use href="#bf175" transform="rotate(-32)"/>
          <use href="#bf175" transform="rotate(32)"/>
          <use href="#bf140" transform="rotate(-65)"/>
          <use href="#bf140" transform="rotate(65)"/>
          <use href="#bf100" transform="rotate(-105)"/>
          <use href="#bf100" transform="rotate(105)"/>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(1080 295) rotate(12)">
    <g transform="scale(0.42)">
      <rect x="-3.5" y="0" width="7" height="68" rx="3" fill="#365314"/>
      <g fill="url(#leaf)" stroke="#022c22" stroke-width="2" stroke-linejoin="round">
        <use href="#bf200"/>
        <use href="#bf175" transform="rotate(-32)"/>
        <use href="#bf175" transform="rotate(32)"/>
        <use href="#bf140" transform="rotate(-65)"/>
        <use href="#bf140" transform="rotate(65)"/>
        <use href="#bf100" transform="rotate(-105)"/>
        <use href="#bf100" transform="rotate(105)"/>
      </g>
    </g>
  </g>

  <g opacity="0.5" stroke="#fffbeb" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M 260 175 Q 270 140, 255 105 Q 275 70, 260 35 Q 280 5, 265 -25">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 6 -8; 0 0" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 1100 200 Q 1110 165, 1095 130 Q 1115 95, 1105 60">
      <animate attributeName="opacity" values="0.4;0.05;0.4" dur="7s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; -5 -10; 0 0" dur="7s" begin="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="640" y="170" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="900"
        fill="#1a0f0a" letter-spacing="-2"
        filter="url(#titleShadow)" opacity="0.55">
    The Grow Calendar
  </text>
  <text x="640" y="170" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="900"
        fill="#fffbeb" letter-spacing="-2">
    The Grow Calendar
  </text>

  <text x="640" y="208" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13" letter-spacing="10"
        fill="#fef9c3" opacity="0.9">
    GROW LOG · ATHENS, OHIO · 2026
  </text>

  <line x1="510" y1="230" x2="770" y2="230"
        stroke="#fef9c3" stroke-width="1" opacity="0.45"/>
</svg>
