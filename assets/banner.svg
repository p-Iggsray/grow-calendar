<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#0c0a24"/>
      <stop offset="18%"  stop-color="#241057">
        <animate attributeName="stop-color" values="#241057;#2a1463;#241057" dur="16s" repeatCount="indefinite"/>
      </stop>
      <stop offset="38%"  stop-color="#5b1f86">
        <animate attributeName="stop-color" values="#5b1f86;#67248f;#5b1f86" dur="16s" repeatCount="indefinite"/>
      </stop>
      <stop offset="54%"  stop-color="#b3246b">
        <animate attributeName="stop-color" values="#b3246b;#c42c78;#b3246b" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%"  stop-color="#ed5a2b">
        <animate attributeName="stop-color" values="#ed5a2b;#f2662f;#ed5a2b" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="85%"  stop-color="#f9a826"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#fffbeb" stop-opacity="0.95"/>
      <stop offset="35%"  stop-color="#fde047" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#fb923c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="scrim" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#06040f" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#06040f" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#06040f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="hillBack" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1c5a33"/>
      <stop offset="100%" stop-color="#0a3a1f"/>
    </linearGradient>
    <linearGradient id="hillFront" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0a3019"/>
      <stop offset="100%" stop-color="#04150b"/>
    </linearGradient>
    <linearGradient id="leafDark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0e3d22"/>
      <stop offset="100%" stop-color="#03130a"/>
    </linearGradient>
    <linearGradient id="rayGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </linearGradient>

    <path id="bf200" d="M 0 0 C -10 -10, -18 -30, -18 -60 C -18 -94, -10 -150, 0 -200 C 10 -150, 18 -94, 18 -60 C 18 -30, 10 -10, 0 0 Z"/>
    <path id="bf175" d="M 0 0 C -10 -8, -17 -28, -17 -55 C -17 -86, -10 -130, 0 -175 C 10 -130, 17 -86, 17 -55 C 17 -28, 10 -8, 0 0 Z"/>
    <path id="bf140" d="M 0 0 C -8 -8, -14 -22, -14 -45 C -14 -72, -8 -105, 0 -140 C 8 -105, 14 -72, 14 -45 C 14 -22, 8 -8, 0 0 Z"/>
    <path id="bf100" d="M 0 0 C -7 -6, -12 -18, -12 -35 C -12 -56, -7 -76, 0 -100 C 7 -76, 12 -56, 12 -35 C 12 -18, 7 -6, 0 0 Z"/>
    <path id="ray" d="M -5 -78 L 0 -300 L 5 -78 Z"/>

    <g id="plant">
      <rect x="-3" y="0" width="6" height="64" rx="3" fill="#06210f"/>
      <g fill="url(#leafDark)">
        <use href="#bf200"/>
        <use href="#bf175" transform="rotate(-32)"/>
        <use href="#bf175" transform="rotate(32)"/>
        <use href="#bf140" transform="rotate(-65)"/>
        <use href="#bf140" transform="rotate(65)"/>
        <use href="#bf100" transform="rotate(-105)"/>
        <use href="#bf100" transform="rotate(105)"/>
      </g>
    </g>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="1280" height="360" fill="url(#sky)"/>

  <!-- stars in the dark upper sky -->
  <g fill="#fffbeb">
    <circle cx="120" cy="46" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="78" r="1"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="408" cy="40" r="1.2"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="4.6s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="556" cy="62" r="1"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.2s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="38" r="1.3"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="5s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="70" r="1"><animate attributeName="opacity" values="0.1;0.75;0.1" dur="3.8s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="1015" cy="44" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.3s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="74" r="1"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="3.4s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="1208" cy="40" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.8s" begin="0.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- high faint cloud drifting above the title -->
  <g fill="#2b1a5e" opacity="0.5">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-260 0; 1400 0" dur="70s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="96" rx="120" ry="11"/>
      <ellipse cx="70" cy="90" rx="80" ry="9"/>
      <ellipse cx="-60" cy="100" rx="70" ry="8"/>
    </g>
  </g>

  <!-- sun glow + rotating rays + disk (lower half tucked behind the hills) -->
  <circle cx="640" cy="250" r="225" fill="url(#sunGlow)">
    <animate attributeName="r" values="225;250;225" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="9s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(640 252)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 0 0; 360 0 0" dur="150s" repeatCount="indefinite"/>
      <g fill="url(#rayGrad)">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="8s" repeatCount="indefinite"/>
        <use href="#ray"/>
        <use href="#ray" transform="rotate(30)"/>
        <use href="#ray" transform="rotate(60)"/>
        <use href="#ray" transform="rotate(90)"/>
        <use href="#ray" transform="rotate(120)"/>
        <use href="#ray" transform="rotate(150)"/>
        <use href="#ray" transform="rotate(180)"/>
        <use href="#ray" transform="rotate(210)"/>
        <use href="#ray" transform="rotate(240)"/>
        <use href="#ray" transform="rotate(270)"/>
        <use href="#ray" transform="rotate(300)"/>
        <use href="#ray" transform="rotate(330)"/>
      </g>
    </g>
  </g>

  <circle cx="640" cy="250" r="46" fill="#fff3d0" opacity="0.95">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- warm low clouds near the horizon -->
  <g fill="#7a2f63" opacity="0.4">
    <g>
      <animateTransform attributeName="transform" type="translate" values="1400 0; -360 0" dur="55s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="222" rx="150" ry="12"/>
      <ellipse cx="95" cy="216" rx="95" ry="10"/>
      <ellipse cx="-85" cy="226" rx="80" ry="9"/>
    </g>
  </g>
  <g fill="#9c3a3f" opacity="0.32">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-300 0; 1460 0" dur="80s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="244" rx="130" ry="10"/>
      <ellipse cx="80" cy="240" rx="80" ry="8"/>
    </g>
  </g>

  <!-- distant ridge -->
  <path d="M0,250 C 200,225 380,255 560,238 C 760,220 980,250 1280,232 L1280,360 L0,360 Z" fill="url(#hillBack)"/>

  <!-- distant plants on the back ridge -->
  <g transform="translate(520 243) scale(0.32)">
    <g><animateTransform attributeName="transform" type="rotate" values="-2.5 0 0; 2.5 0 0; -2.5 0 0" dur="11s" repeatCount="indefinite"/><use href="#plant"/></g>
  </g>
  <g transform="translate(820 233) scale(0.3)">
    <g><animateTransform attributeName="transform" type="rotate" values="2.5 0 0; -2.5 0 0; 2.5 0 0" dur="12s" repeatCount="indefinite"/><use href="#plant"/></g>
  </g>

  <!-- front ridge -->
  <path d="M0,300 C 220,275 420,300 640,285 C 880,268 1080,298 1280,280 L1280,360 L0,360 Z" fill="url(#hillFront)"/>

  <!-- foreground plants, staggered sway -->
  <g transform="translate(110 296) scale(0.6)">
    <g><animateTransform attributeName="transform" type="rotate" values="-4 0 0; 4 0 0; -4 0 0" dur="7s" repeatCount="indefinite"/><use href="#plant"/></g>
  </g>
  <g transform="translate(300 286) scale(0.72)">
    <g><animateTransform attributeName="transform" type="rotate" values="4 0 0; -4 0 0; 4 0 0" dur="8.5s" repeatCount="indefinite"/><use href="#plant"/></g>
  </g>
  <g transform="translate(980 284) scale(0.7)">
    <g><animateTransform attributeName="transform" type="rotate" values="-4 0 0; 4 0 0; -4 0 0" dur="7.8s" repeatCount="indefinite"/><use href="#plant"/></g>
  </g>
  <g transform="translate(1170 290) scale(0.56)">
    <g><animateTransform attributeName="transform" type="rotate" values="3.5 0 0; -3.5 0 0; 3.5 0 0" dur="9s" repeatCount="indefinite"/><use href="#plant"/></g>
  </g>

  <!-- rising fireflies / pollen -->
  <g fill="#fde047">
    <circle cx="200" cy="300" r="2" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.9;0" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 14 -140" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="300" r="1.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.85;0" dur="7.5s" begin="1.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -12 -160" dur="7.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="690" cy="300" r="2.2" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.95;0" dur="6.8s" begin="0.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -150" dur="6.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="300" r="1.6" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -16 -170" dur="8s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="300" r="2" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.9;0" dur="7s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 12 -150" dur="7s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="300" r="1.6" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.8;0" dur="9s" begin="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -8 -180" dur="9s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1210" cy="300" r="1.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.85;0" dur="6.4s" begin="1.7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 -150" dur="6.4s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- smoke wisps -->
  <g opacity="0.45" stroke="#e9e2ff" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M 312 250 Q 322 215, 307 180 Q 327 145, 312 110">
      <animate attributeName="opacity" values="0.45;0.08;0.45" dur="6.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 7 -10; 0 0" dur="6.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 992 248 Q 1002 213, 987 178 Q 1007 143, 997 108">
      <animate attributeName="opacity" values="0.4;0.05;0.4" dur="7.5s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -6 -12; 0 0" dur="7.5s" begin="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- soft dark scrim so the title always reads -->
  <ellipse cx="640" cy="150" rx="480" ry="132" fill="url(#scrim)"/>

  <!-- title: blurred shadow, soft pulsing glow, crisp top layer -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 14; 0 0" dur="1.4s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
    <animate attributeName="opacity" values="0;1" dur="1.4s" begin="0s" fill="freeze"/>

    <text x="640" y="142" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900"
          letter-spacing="-2" fill="#06040f" opacity="0.6" filter="url(#softBlur)">The Grow Calendar</text>

    <text x="640" y="142" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900"
          letter-spacing="-2" fill="#fff7e6" filter="url(#softBlur)">
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="7s" repeatCount="indefinite"/>
      The Grow Calendar
    </text>

    <text x="640" y="142" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900"
          letter-spacing="-2" fill="#fffbeb">The Grow Calendar</text>

    <text x="640" y="180" text-anchor="middle"
          font-family="'Courier New', Courier, monospace" font-size="13" letter-spacing="10"
          fill="#fde9b0">GROW LOG · ATHENS, OHIO · 2026</text>

    <line x1="512" y1="200" x2="768" y2="200" stroke="#fde9b0" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
